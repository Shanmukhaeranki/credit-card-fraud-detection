 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Detection System</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; text-align: center; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 20px; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; display: none; }
        .fraud { background: #ffebee; color: #c62828; }
        .legit { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>💳 Credit Card Fraud Detector</h1>
    <div style="text-align:center; margin-bottom: 20px;">
        <a href="/dashboard" style="background:#333; color:white; padding:8px 20px; border-radius:6px; text-decoration:none; font-size:14px;">
            📊 View Dashboard
        </a>
    </div>

    <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="e.g. 5000" />
    </div>
    <div class="form-group">
        <label>Transaction Hour (0-23)</label>
        <input type="number" id="transaction_hour" placeholder="e.g. 2" />
    </div>
    <div class="form-group">
        <label>Foreign Transaction?</label>
        <select id="foreign_transaction">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>
    </div>
    <div class="form-group">
        <label>Location Mismatch?</label>
        <select id="location_mismatch">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>
    </div>
    <div class="form-group">
        <label>Device Trust Score (0-1)</label>
        <input type="number" id="device_trust_score" step="0.01" placeholder="e.g. 0.3" />
    </div>
    <div class="form-group">
        <label>Velocity Last 24h (no. of transactions)</label>
        <input type="number" id="velocity_last_24h" placeholder="e.g. 8" />
    </div>
    <div class="form-group">
        <label>Merchant Category</label>
        <select id="merchant_category">
            <option value="Grocery">Grocery</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Electronics">Electronics</option>
            <option value="Entertainment">Entertainment</option>
        </select>
    </div>

    <button onclick="predict()">🔍 Check Transaction</button>

    <div id="result"></div>

    <script>
        async function predict() {
            const data = {
                amount: parseFloat(document.getElementById('amount').value),
                transaction_hour: parseInt(document.getElementById('transaction_hour').value),
                foreign_transaction: parseInt(document.getElementById('foreign_transaction').value),
                location_mismatch: parseInt(document.getElementById('location_mismatch').value),
                device_trust_score: parseFloat(document.getElementById('device_trust_score').value),
                velocity_last_24h: parseInt(document.getElementById('velocity_last_24h').value),
                merchant_category: document.getElementById('merchant_category').value
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const div = document.getElementById('result');
            div.style.display = 'block';
            div.className = result.result === 'FRAUD' ? 'fraud' : 'legit';
            div.innerHTML = result.result === 'FRAUD' 
                ? `🚨 FRAUD DETECTED! Confidence: ${result.confidence}%`
                : `✅ LEGITIMATE Transaction. Confidence: ${result.confidence}%`;
        }
    </script>
</body>
</html>
